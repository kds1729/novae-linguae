[package]
name = "nl-validator"
version = "0.1.0"
edition = "2021"
description = "Reference validator, canonicalizer, and hasher for Novae Linguae artifacts"
license = "Apache-2.0 OR MIT"
publish = false

[[bin]]
name = "nl-validator"
path = "src/main.rs"

[lib]
name = "nl_validator"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
jsonschema = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_jcs = "0.1"

# blake3 = "1" lands with the hash subcommand.
